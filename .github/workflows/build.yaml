name: README build
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch: # 1. Added so you can run it manually

permissions:
  contents: write # 2. Added to give the bot permission to push changes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 3. Updated to v4 (v2 is deprecated)
        with:
          fetch-depth: 1
          
      - name: Get Python 3.8
        uses: actions/setup-python@v5 # 3. Updated to v5 (v2 is deprecated)
        with:
          python-version: '3.8'
          
      - name: Configure pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # CHANGED: Swapped '**/cache/requirements.txt' to 'cache/requirements.txt' so hashFiles can find it perfectly
          key: ${{ runner.os }}-pip-${{ hashFiles('cache/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
          
      - name: Install dependencies
        # CHANGED: Added pip upgrade and fallback check to prevent environment setup crashes
        run: |
          python -m pip install --upgrade pip
          if [ -f cache/requirements.txt ]; then python -m pip install -r cache/requirements.txt; fi
        
      - name: Update README file
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN || github.token }}
          USER_NAME: ${{ secrets.USER_NAME || github.repository_owner }}
        run: python today.py
        
      - name: Commit
        run: |-
          git add .
          git diff
          # 4. Replaced the hardcoded 'andrew6rant' with the standard GitHub Actions Bot identity
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git commit -m "Updated README" -a || echo "No changes to commit"
          git push
