<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" font-family="ConsolasFallback,Consolas,monospace" width="985px" height="530px" viewBox="0 0 985 530" font-size="16px">

<defs>
  <!-- Softer glow for light mode -->
  <filter id="wm-glow" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<style>
@font-face {
src: local('Consolas'), local('Consolas Bold');
font-family: 'ConsolasFallback';
font-display: swap;
-webkit-size-adjust: 109%;
size-adjust: 109%;
}
.key {fill: #953800;} /* Darker orange for light bg */
.value {fill: #0550ae;} /* Darker blue for light bg */
.addColor {fill: #1a7f37;} /* Darker green for light bg */
.delColor {fill: #cf222e;} /* Darker red for light bg */
.cc {fill: #656d76;} /* Medium gray for dots */
text, tspan {white-space: pre;}
.ascii {font-size: 10px;}

.watermark-path {
  fill: none;
  stroke: #8b949e; /* Muted gray-blue for light mode */
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
  opacity: 0;
  filter: url(#wm-glow);
  stroke-dasharray: 790;
  stroke-dashoffset: 790;
  animation: drawSymbol 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}

@keyframes drawSymbol {
  0%   { stroke-dashoffset: 790; opacity: 0;    }
  5%   {                           opacity: 0.08; } /* Subtler opacity */
  45%  { stroke-dashoffset: 0;     opacity: 0.08; }
  75%  { stroke-dashoffset: 0;     opacity: 0.08; }
  90%  {                           opacity: 0;    }
  100% { stroke-dashoffset: 790;  opacity: 0;    }
}
</style>

<!-- Light mode background -->
<rect width="985px" height="530px" fill="#f6f8fa" rx="15"/>

<!-- BACKGROUND WATERMARK ANIMATION START -->
<g id="background-watermark" transform="translate(430, 170)">
  <path class="watermark-path" d="M 324,204             L 180,24             L 348,24             C 384,24 408,48 408,84             C 408,120 384,156 348,156             L 120,156"/>
</g>
<!-- BACKGROUND WATERMARK ANIMATION END -->

